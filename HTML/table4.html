<!DOCTYPE html>
<html>
<head>
<style>
table{
    border-collapse: collapse;
}
td{
    border:1px solid #000;
    text-align:center;
    padding:15px;
}
</style>
</head>
<body>

<table>
    <tr>
        <td>1</td>
        <td colspan="2">2</td>
        <td>3</td>
    </tr>

    <tr>
        <td rowspan="2">4</td>
        <td colspan="3">5</td>
    </tr>

    <tr>
        <td colspan="3">6</td>
    </tr>

    <tr>
        <td rowspan="3">8</td>
        <td>9</td>
        <td>10</td>
        <td rowspan="2">7</td>
    </tr>

    <tr>
        <td colspan="2">12</td>
    </tr>

    <tr>
        <td rowspan="3">13</td>
        <td colspan="3">14</td>
    </tr>

    <tr>
        <td colspan="2">15</td>
        <td>16</td>
    </tr>

    <tr>
        <td colspan="3">17</td>
    </tr>
</table>

</body>
</html>
