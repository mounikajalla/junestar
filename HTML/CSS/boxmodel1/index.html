
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

    <div class="header">
        <h2>IDENTIFICATION CARD</h2>
    </div>

    <div class="content">

        <div class="photo">
            <img src="https://img.magnific.com/free-photo/young-beautiful-woman-pink-warm-sweater-natural-look-smiling-portrait-isolated-long-hair_285396-896.jpg?semt=ais_hybrid&w=740&q=80" alt="Photo">
        </div>

        <div class="details">
            <p><span>Name:</span> JOHN DOE</p>
            <p><span>Title:</span> Director</p>
            <p><span>ID No:</span> 123456</p>
            <p><span>Issued:</span> 01/01/2020</p>
            <p><span>Expires:</span> 31/12/2020</p>

            <h1>COMPANY</h1>
        </div>

    </div>

</div>

</body>
</html>
