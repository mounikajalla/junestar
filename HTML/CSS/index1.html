    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AchieversIT Product Dashboard</title>
  <link rel="stylesheet" href="style6.css">
</head>
<body>
  <header>
    <h1 id="logo"> AchieversIT Store</h1>
  </header>

  <main class="products">
    <section class="product-card hot-deal">
      <h2 class="product-name">Laptop</h2>
      <div class="offer">
        <p class="price">$999</p>
      </div>
      <button class="cart-btn">Add to Cart</button>
    </section>

    <section class="product-card discount">
      <h2 class="product-name">Smartphone</h2>
      <div class="offer">
        <p class="price">$499</p>
      </div>
      <button class="cart-btn">Add to Cart</button>
    </section>

    <section class="product-card">
      <h2 class="product-name">Headphones</h2>
      <div class="offer">
        <p class="price">$199</p>
      </div>
      <button class="cart-btn">Add to Cart</button>
    </section>

    <section class="product-card limited-stock">
      <h2 class="product-name">Gaming Console</h2>
      <div class="offer">
        <p class="price">$399</p>
      </div>
      <button class="cart-btn">Add to Cart</button>
    </section>
  </main>
</body>
</html>

</body>
