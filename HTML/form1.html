<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Login form using HTML and CSS</h1>  
    <h2>Sign In</h2>
    <p>Sign in with your username and password</p>
    <label for="Your username">username:</label>
    <input type="text" id="Your username" placeholder="Enter username" name="UserName" required autofocus>
    <br>
    <label for="Your password">password:</label>
    <input type="password" id="Your password" placeholder="Enter password" name="Password" required>
    <br> 
    <button type="submit">Login</button>   
    <br>
    <p>Not a member?<a href="register.html">Register here</a></p>

</body>
