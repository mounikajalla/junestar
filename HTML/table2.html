!DOCTYPE html>
<html lang="en">
    <head>
        <title>colspan and Rowspan Table</title>
        <style>
        table{ 
            border-collapse: collapse;
            margin: 20px auto;
        }
        td{
        border: 2px solid white;
        background-color: green;
        color: white;
        text-align: center;
        font-size: 24px;
        width:50px;
        height: 50px;
        }
          </style>
    </head>
    <body>
        <table>
            <tr>
                <td rowspan="10">A</td>
                <td rowspan="9">B</td>
                 <td rowspan="8">C</td>
                 <td rowspan="7">D</td>
                 <td rowspan="6">E</td>
                 <td rowspan="5">F</td>
                 <td rowspan="2">AH</td>
                 <td rowspan="5">I</td>
                 <td rowspan="7">J</td>
                 <td rowspan="8">K</td>
                 <td rowspan="9">L</td>
                 <td rowspan="10">M</td>
</tr>
<tr>
    <td colspan="2">H</td>
</tr>
<tr>
    <td colspan="2">GH</td>
</tr>
<tr>
    <td colspan="2">N</td>
</tr>
<tr>
    <td colspan="4">O</td>
</tr>
<tr>
    <td colspan="6">P</td>
</tr>
<tr>
    <td colspan="8">Q</td>
</tr>
<tr>
   
     <td>R</td>
      <td>S</td>
       <td>T</td>
        <td>U</td>
         <td>V</td>
          <td>W</td>
           <td>X</td>
</tr>
<tr>
    <td colspan="11">Y</td>
</tr>
<tr>
   
     <td>Z</td>
      <td>1</td>
       <td>2</td>
        <td>3</td>
         <td>4</td>
          <td>5</td>
           <td>6</td>
           <td>7</td>
           <td>8</td>
           <td>9</td>
           <td>10</td>
</tr>
            
        </table>
        </body>
        </html>
