<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Form Types Demo</title>
</head>
<body>

    <h1>All Form Types Demo</h1>

    <form>

        <label>Text:</label>
        <input type="text" placeholder="Your name"><br><br>

        <label>Password:</label>
        <input type="password" placeholder="Secret"><br><br>

        <label>Email:</label>
        <input type="email" placeholder="you@example.com"><br><br>

        <label>URL:</label>
        <input type="url" placeholder="https://example.com"><br><br>

        <label>Telephone:</label>
        <input type="tel" placeholder="+91 98765 43210"><br><br>

        <label>Search:</label>
        <input type="search" placeholder="Search term"><br><br>

        <label>Number:</label>
        <input type="number"><br><br>

        <label>Range:</label>
        <input type="range" min="0" max="100"><br><br>

        <label>Date:</label>
        <input type="date">

        <label>Time:</label>
        <input type="time">

        <label>Week:</label>
        <input type="week">

        <label>Month:</label>
        <input type="month"><br><br>

        <label>File:</label>
        <input type="file"><br><br>

        <label>Color:</label>
        <input type="color" value="#2196F3"><br><br>

        <input type="checkbox" id="terms">
        <label for="terms">I agree to the terms</label><br>

        <input type="checkbox" id="newsletter" checked>
        <label for="newsletter">Subscribe to newsletter</label><br><br>

        <label>Gender:</label><br>

        <input type="radio" id="male" name="gender">
        <label for="male">Male</label><br>

        <input type="radio" id="female" name="gender">
        <label for="female">Female</label><br>

        <input type="radio" id="other" name="gender" checked>
        <label for="other">Other</label><br><br>

        <label>Country (single select):</label>
        <select>
            <option>-- choose --</option>
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
            <option>Australia</option>
        </select>
        <br><br>

        <label>Message:</label><br>
        <textarea rows="5" cols="40" placeholder="Write something..."></textarea>
        <br><br>

        <input type="submit" value="Submit Form">
        <input type="reset" value="Reset Form">

    </form>

</body>
</html>
